version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: hr-erp-db
    environment:
      POSTGRES_DB: hr_erp
      POSTGRES_USER: hr_user
      POSTGRES_PASSWORD: hr_password_secure_123
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  web:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: hr-erp-web
    ports:
      - "127.0.0.1:8501:8501"
    volumes:
      - ./hr_documents:/app/hr_documents
    environment:
      - DB_HOST=aws-1-ap-southeast-2.pooler.supabase.com
      - DB_NAME=postgres
      - DB_USER=postgres.xqvepcckxlggtjawsfqn
      - DB_PASSWORD=YOUR_SUPABASE_PASSWORD_HERE
      - DB_PORT=5432
      - DB_SSLMODE=require
    depends_on:
      - db
    restart: unless-stopped

volumes:
  postgres_data:





